version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentnet
      POSTGRES_PASSWORD: agentnet
      POSTGRES_DB: agentnet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bot:
    build: .
    command: node src/index.js
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: node src/queue/worker.js
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  pgdata:
